            - name: Issue Importer Action
  # You may pin to the exact commit or the version.
  # uses: dsanchezcr/issue-importer-action@249e0302d92b1583300aaea2abc5881e992f9194
  uses: dsanchezcr/issue-importer-action@v1.0.0
  with:
    # Path to the CSV or JSON file containing issues to import
    file-path: 
    # Format of the input file (csv or json)
    file-format: # default is csv
    # GitHub token with repository write permissions
    github-token: 
    # Perform a dry run without creating actual issues
    dry-run: # optional, default is false
          
